<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Performance</title>
    <style>
        table {
            width: 50%;
            border-collapse: collapse;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h2 style="text-align: center;">Portfolio Performance</h2>

<table>
    <thead>
        <tr>
            <th>Portfolio Value When Sold</th>
            <th>Portfolio Value If Not Sold</th>
            <th>Delta (%)</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td id="soldValue">Loading...</td>
            <td id="notSoldValue">Loading...</td>
            <td id="delta">Loading...</td>
        </tr>
    </tbody>
</table>

<script>
    // Example portfolio data (replace this with actual data from your backend or calculations)
    const portfolioData = [
        { company: 'Company A', boughtPrice: 100, soldPrice: 150, shares: 10 },
        { company: 'Company B', boughtPrice: 50, soldPrice: 70, shares: 20 },
        { company: 'Company C', boughtPrice: 200, soldPrice: 250, shares: 5 }
    ];

    // Calculate total values
    const portfolioValueWhenSold = portfolioData.reduce((acc, stock) => acc + stock.soldPrice * stock.shares, 0);
    const portfolioValueIfNotSold = portfolioData.reduce((acc, stock) => acc + stock.boughtPrice * stock.shares, 0);
    const delta = ((portfolioValueWhenSold - portfolioValueIfNotSold) / portfolioValueIfNotSold) * 100;

    // Display the results in the table
    document.getElementById('soldValue').innerText = `$${portfolioValueWhenSold.toFixed(2)}`;
    document.getElementById('notSoldValue').innerText = `$${portfolioValueIfNotSold.toFixed(2)}`;
    document.getElementById('delta').innerText = `${delta.toFixed(2)}%`;
</script>

</body>
</html>
