<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Price Tracker</title>
</head>
<body>
    <button onclick="askSoldPrices()">What I Sold</button>
    <button onclick="askPricesToday()">What is the sold price today?</button>
    
    <!-- Date display -->
    <div id="dateDisplay"></div>

    <table id="priceTable" border="1">
        <thead>
            <tr>
                <th>Company</th>
                <th>Quantity</th> <!-- New column for quantity -->
                <th>Sold Price</th>
                <th>Prices Today</th>
                <th>Delta</th>
                <th>Delta (%)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Goog</td>
                <td id="googQuantity"></td> <!-- Quantity cell for Goog -->
                <td id="googSoldPrice"></td>
                <td id="googTodayPrice"></td>
                <td id="googDelta"></td>
                <td id="googDeltaPercentage"></td>
            </tr>
            <tr>
                <td>MSFT</td>
                <td id="msftQuantity"></td> <!-- Quantity cell for MSFT -->
                <td id="msftSoldPrice"></td>
                <td id="msftTodayPrice"></td>
                <td id="msftDelta"></td>
                <td id="msftDeltaPercentage"></td>
            </tr>
            <tr>
                <td>NFLX</td>
                <td id="nflxQuantity"></td> <!-- Quantity cell for NFLX -->
                <td id="nflxSoldPrice"></td>
                <td id="nflxTodayPrice"></td>
                <td id="nflxDelta"></td>
                <td id="nflxDeltaPercentage"></td>
            </tr>
            <tr>
                <td>AMZN</td>
                <td id="amznQuantity"></td> <!-- Quantity cell for AMZN -->
                <td id="amznSoldPrice"></td>
                <td id="amznTodayPrice"></td>
                <td id="amznDelta"></td>
                <td id="amznDeltaPercentage"></td>
            </tr>
            <tr>
                <td>NVDA</td>
                <td id="nvdaQuantity"></td> <!-- Quantity cell for NVDA -->
                <td id="nvdaSoldPrice"></td>
                <td id="nvdaTodayPrice"></td>
                <td id="nvdaDelta"></td>
                <td id="nvdaDeltaPercentage"></td>
            </tr>
            <tr>
                <td>META</td>
                <td id="metaQuantity"></td> <!-- Quantity cell for META -->
                <td id="metaSoldPrice"></td>
                <td id="metaTodayPrice"></td>
                <td id="metaDelta"></td>
                <td id="metaDeltaPercentage"></td>
            </tr>
        </tbody>
    </table>
</body>
<script src="app.js"></script>
</html>
