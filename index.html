<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Portfolio Tracker</title>
</head>
<body>
    <h2>Stock Portfolio Tracker</h2>

    <button onclick="askSoldPrices()">What I Sold</button>
    <br><br>

    <!-- Stocks Table -->
    <h3>Stocks</h3>
    <table id="stocksTable" border="1">
        <thead>
            <tr>
                <th>Company</th>
                <th>Sold Price</th>
                <th>Quantity</th>
                <th>Delta ($)</th>
                <th>Delta (%)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Goog</td>
                <td id="googSoldPrice"></td>
                <td id="googQuantity"></td>
                <td id="googDelta"></td>
                <td id="googDeltaPercentage"></td>
            </tr>
            <tr>
                <td>MSFT</td>
                <td id="msftSoldPrice"></td>
                <td id="msftQuantity"></td>
                <td id="msftDelta"></td>
                <td id="msftDeltaPercentage"></td>
            </tr>
            <tr>
                <td>NFLX</td>
                <td id="nflxSoldPrice"></td>
                <td id="nflxQuantity"></td>
                <td id="nflxDelta"></td>
                <td id="nflxDeltaPercentage"></td>
            </tr>
            <tr>
                <td>AMZN</td>
                <td id="amznSoldPrice"></td>
                <td id="amznQuantity"></td>
                <td id="amznDelta"></td>
                <td id="amznDeltaPercentage"></td>
            </tr>
            <tr>
                <td>NVDA</td>
                <td id="nvdaSoldPrice"></td>
                <td id="nvdaQuantity"></td>
                <td id="nvdaDelta"></td>
                <td id="nvdaDeltaPercentage"></td>
            </tr>
            <tr>
                <td>META</td>
                <td id="metaSoldPrice"></td>
                <td id="metaQuantity"></td>
                <td id="metaDelta"></td>
                <td id="metaDeltaPercentage"></td>
            </tr>
        </tbody>
    </table>

    <br><br>

    <button onclick="askPricesToday()">What is the Sold Price Today?</button>

    <!-- Portfolio Table -->
    <h3>Portfolio</h3>
    <table id="portfolioTable" border="1">
        <thead>
            <tr>
                <th>Company</th>
                <th>Quantity</th>
                <th>Sold Price</th>
                <th>Sold Portfolio</th>
                <th>Prices Today</th>
                <th>Portfolio Today</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Goog</td>
                <td id="googPortfolioQuantity"></td>
                <td id="googSoldPortfolio"></td>
                <td id="googPortfolioSoldValue"></td>
                <td id="googPortfolioTodayPrice"></td>
                <td id="googPortfolioTodayValue"></td>
            </tr>
            <tr>
                <td>MSFT</td>
                <td id="msftPortfolioQuantity"></td>
                <td id="msftSoldPortfolio"></td>
                <td id="msftPortfolioSoldValue"></td>
                <td id="msftPortfolioTodayPrice"></td>
                <td id="msftPortfolioTodayValue"></td>
            </tr>
            <tr>
                <td>NFLX</td>
                <td id="nflxPortfolioQuantity"></td>
                <td id="nflxSoldPortfolio"></td>
                <td id="nflxPortfolioSoldValue"></td>
                <td id="nflxPortfolioTodayPrice"></td>
                <td id="nflxPortfolioTodayValue"></td>
            </tr>
            <tr>
                <td>AMZN</td>
                <td id="amznPortfolioQuantity"></td>
                <td id="amznSoldPortfolio"></td>
                <td id="amznPortfolioSoldValue"></td>
                <td id="amznPortfolioTodayPrice"></td>
                <td id="amznPortfolioTodayValue"></td>
            </tr>
            <tr>
                <td>NVDA</td>
                <td id="nvdaPortfolioQuantity"></td>
                <td id="nvdaSoldPortfolio"></td>
                <td id="nvdaPortfolioSoldValue"></td>
                <td id="nvdaPortfolioTodayPrice"></td>
                <td id="nvdaPortfolioTodayValue"></td>
            </tr>
            <tr>
                <td>META</td>
                <td id="metaPortfolioQuantity"></td>
                <td id="metaSoldPortfolio"></td>
                <td id="metaPortfolioSoldValue"></td>
                <td id="metaPortfolioTodayPrice"></td>
                <td id="metaPortfolioTodayValue"></td>
            </tr>
        </tbody>
    </table>

    <script src="app.js"></script>
</body>
</html>
