<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Performance</title>
    <style>
        table {
            width: 50%;
            border-collapse: collapse;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h2 style="text-align: center;">Stock Performance</h2>

<!-- Individual Stocks Table -->
<table id="stockTable">
    <thead>
        <tr>
            <th>Company</th>
            <th>Sold Price</th>
            <th>Price Today</th>
            <th>Quantity</th>
            <th>Delta</th>
        </tr>
    </thead>
    <tbody>
        <!-- Data rows will be populated here -->
    </tbody>
</table>

<h2 style="text-align: center;">Portfolio Performance</h2>

<!-- Portfolio Summary Table -->
<table>
    <thead>
        <tr>
            <th>Portfolio Value When Sold</th>
            <th>Portfolio Value If Not Sold</th>
            <th>Delta (%)</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td id="soldValue">Loading...</td>
            <td id="notSoldValue">Loading...</td>
            <td id="delta">Loading...</td>
        </tr>
    </tbody>
</table>

<script>
    // Define stock data (Replace this with actual data or user inputs)
    const stocks = [
        { company: 'Goog', soldPrice: 1500, priceToday: 1550, quantity: 10 },
        { company: 'MSFT', soldPrice: 280, priceToday: 300, quantity: 15 },
        { company: 'NFLX', soldPrice: 500, priceToday: 520, quantity: 8 },
        { company: 'AMZN', soldPrice: 3300, priceToday: 3400, quantity: 5 },
        { company: 'NVDA', soldPrice: 200, priceToday: 220, quantity: 12 },
        { company: 'META', soldPrice: 350, priceToday: 370, quantity: 7 }
    ];

    // Populate the stocks table
    const stockTable = document.getElementById('stockTable').getElementsByTagName('tbody')[0];
    let portfolioValueWhenSold = 0;
    let portfolioValueIfNotSold = 0;

    stocks.forEach(stock => {
        const delta = ((stock.priceToday - stock.soldPrice) / stock.soldPrice) * 100;
        
        // Add a new row to the stock table
        const row = stockTable.insertRow();
        row.insertCell(0).innerText = stock.company;
        row.insertCell(1).innerText = `$${stock.soldPrice.toFixed(2)}`;
        row.insertCell(2).innerText = `$${stock.priceToday.toFixed(2)}`;
        row.insertCell(3).innerText = stock.quantity;
        row.insertCell(4).innerText = `${delta.toFixed(2)}%`;

        // Add to the portfolio calculation
        portfolioValueWhenSold += stock.soldPrice * stock.quantity;
        portfolioValueIfNotSold += stock.priceToday * stock.quantity;
    });

    // Calculate portfolio delta
    const portfolioDelta = ((portfolioValueWhenSold - portfolioValueIfNotSold) / portfolioValueIfNotSold) * 100;

    // Update the portfolio table
    document.getElementById('soldValue').innerText = `$${portfolioValueWhenSold.toFixed(2)}`;
    document.getElementById('notSoldValue').innerText = `$${portfolioValueIfNotSold.toFixed(2)}`;
    document.getElementById('delta').innerText = `${portfolioDelta.toFixed(2)}%`;
</script>

</body>
</html>
