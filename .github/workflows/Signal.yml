      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance finnhub-python pandas ta numpy pytz requests alpaca-py
      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
          git config --global pull.rebase true
      - name: Run cycles (~4h40m, every 30 min)
        run: |
          chmod +x run_cycle.sh
          BLOCK_SECONDS=16800
          END=$((SECONDS + BLOCK_SECONDS))
          while [ $SECONDS -lt $END ]; do
            bash run_cycle.sh
            if [ $((SECONDS + 1800)) -ge $END ]; then break; fi
            sleep 1800
          done

  block-5:
    needs: block-4
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance finnhub-python pandas ta numpy pytz requests alpaca-py
      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
          git config --global pull.rebase true
      - name: Run cycles (~4h40m, every 30 min)
        run: |
          chmod +x run_cycle.sh
          BLOCK_SECONDS=16800
          END=$((SECONDS + BLOCK_SECONDS))
          while [ $SECONDS -lt $END ]; do
            bash run_cycle.sh
            if [ $((SECONDS + 1800)) -ge $END ]; then break; fi
            sleep 1800
          done

  # ---- GitHub Pages build + deploy (runs once, at the start) -------------
  pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Prepare GitHub Pages Artifacts
        run: |
          mkdir -p artifacts/pages artifacts/data data
          cp -r index.html scripts styles assets artifacts/
          cp pages/*.html artifacts/pages/ || echo "some pages missing"
          find artifacts/ -type l -exec rm -v {} +
      - uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: artifacts/

  deploy:
    needs: pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
