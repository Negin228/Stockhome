name: Website update and ALPACA Trading

on:
  schedule:
    # Start ~2h before US market open, Mon-Fri.
    # 11:30 UTC = 7:30am ET in summer (EDT) / 6:30am ET in winter (EST).
    # NOTE: GitHub cron is fixed UTC and does NOT follow daylight saving, so
    # this lands 2h-before-open in summer and 3h-before-open in winter.
    # Starting a little early is the safe direction (never late). See notes.
    - cron: '30 11 * * 1-5'
  workflow_dispatch:

# Serialize: a new scheduled run WAITS for the current ~23h run to finish
# instead of running in parallel. Guarantees no two runs push at once and
# gives a seamless daily handoff.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

# Secrets shared by every block (workflow-level env keeps it DRY).
env:
  API_KEY: ${{ secrets.API_KEY }}
  ALPACA_NISHANTMEAN_KEY: ${{ secrets.ALPACA_NISHANTMEAN_KEY }}
  ALPACA_NISHANTMEAN_SECRET: ${{ secrets.ALPACA_NISHANTMEAN_SECRET }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

# ---------------------------------------------------------------------------
# Each block loops run_cycle.sh every 30 min for ~4h40m (BLOCK_SECONDS=16800),
# then chains to the next via `needs`. 5 blocks x ~4.67h = ~23h of coverage.
# timeout-minutes: 300 (5h) is just a safety cap - the loop exits on its own
# well before that, so the job ends "success" and the chain continues.
# To cover more/less time: add/remove blocks or change BLOCK_SECONDS.
# ---------------------------------------------------------------------------

jobs:
  # ---- Trading + website-update loop -------------------------------------
  block-1:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance finnhub-python pandas ta numpy pytz requests alpaca-py
      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
      - name: Run cycles (~4h40m, every 30 min)
        run: |
          chmod +x run_cycle.sh
          BLOCK_SECONDS=16800
          END=$((SECONDS + BLOCK_SECONDS))
          while [ $SECONDS -lt $END ]; do
            bash run_cycle.sh
            if [ $((SECONDS + 1800)) -ge $END ]; then break; fi
            sleep 1800
          done

  block-2:
    needs: block-1
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance finnhub-python pandas ta numpy pytz requests alpaca-py
      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
      - name: Run cycles (~4h40m, every 30 min)
        run: |
          chmod +x run_cycle.sh
          BLOCK_SECONDS=16800
          END=$((SECONDS + BLOCK_SECONDS))
          while [ $SECONDS -lt $END ]; do
            bash run_cycle.sh
            if [ $((SECONDS + 1800)) -ge $END ]; then break; fi
            sleep 1800
          done

  block-3:
    needs: block-2
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance finnhub-python pandas ta numpy pytz requests alpaca-py
      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
      - name: Run cycles (~4h40m, every 30 min)
        run: |
          chmod +x run_cycle.sh
          BLOCK_SECONDS=16800
          END=$((SECONDS + BLOCK_SECONDS))
          while [ $SECONDS -lt $END ]; do
            bash run_cycle.sh
            if [ $((SECONDS + 1800)) -ge $END ]; then break; fi
            sleep 1800
          done

  block-4:
    needs: block-3
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance finnhub-python pandas ta numpy pytz requests alpaca-py
      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
      - name: Run cycles (~4h40m, every 30 min)
        run: |
          chmod +x run_cycle.sh
          BLOCK_SECONDS=16800
          END=$((SECONDS + BLOCK_SECONDS))
          while [ $SECONDS -lt $END ]; do
            bash run_cycle.sh
            if [ $((SECONDS + 1800)) -ge $END ]; then break; fi
            sleep 1800
          done

  block-5:
    needs: block-4
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance finnhub-python pandas ta numpy pytz requests alpaca-py
      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
      - name: Run cycles (~4h40m, every 30 min)
        run: |
          chmod +x run_cycle.sh
          BLOCK_SECONDS=16800
          END=$((SECONDS + BLOCK_SECONDS))
          while [ $SECONDS -lt $END ]; do
            bash run_cycle.sh
            if [ $((SECONDS + 1800)) -ge $END ]; then break; fi
            sleep 1800
          done

  # ---- GitHub Pages build + deploy (runs once, at the start) -------------
  # Independent of the trading loop, so the site deploys immediately instead
  # of waiting ~23h. Your data/*.json are committed to main every cycle and
  # read client-side, so the site stays fresh without redeploying each cycle.
  pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare GitHub Pages Artifacts
        run: |
          mkdir -p artifacts/pages artifacts/data data
          cp -r index.html scripts styles assets artifacts/
          cp pages/*.html artifacts/pages/ || echo "some pages missing"
          find artifacts/ -type l -exec rm -v {} +
      - uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: artifacts/

  deploy:
    needs: pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
