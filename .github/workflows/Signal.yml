name: Website update and ALPACA Trading

on:
  schedule:
    # Start ~2h before US market open, Mon-Fri.
    # 11:30 UTC = 7:30am ET in summer (EDT) / 6:30am ET in winter (EST).
    - cron: '30 11 * * 1-5'
  workflow_dispatch:

# Serialize: a new scheduled run WAITS for the current ~23h run to finish
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  API_KEY: ${{ secrets.API_KEY }}
  ALPACA_NISHANTMEAN_KEY: ${{ secrets.ALPACA_NISHANTMEAN_KEY }}
  ALPACA_NISHANTMEAN_SECRET: ${{ secrets.ALPACA_NISHANTMEAN_SECRET }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  # ---- Trading + website-update loop -------------------------------------
  block-1:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance finnhub-python pandas ta numpy pytz requests alpaca-py
      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
          git config --global pull.rebase true
      - name: Run cycles (~4h40m, every 30 min)
        run: |
          chmod +x run_cycle.sh
          BLOCK_SECONDS=16800
          END=$((SECONDS + BLOCK_SECONDS))
          while [ $SECONDS -lt $END ]; do
            bash run_cycle.sh
            if [ $((SECONDS + 1800)) -ge $END ]; then break; fi
            sleep 1800
          done

  block-2:
    needs: block-1
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance finnhub-python pandas ta numpy pytz requests alpaca-py
      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
          git config --global pull.rebase true
      - name: Run cycles (~4h40m, every 30 min)
        run: |
          chmod +x run_cycle.sh
          BLOCK_SECONDS=16800
          END=$((SECONDS + BLOCK_SECONDS))
          while [ $SECONDS -lt $END ]; do
            bash run_cycle.sh
            if [ $((SECONDS + 1800)) -ge $END ]; then break; fi
            sleep 1800
          done

  block-3:
    needs: block-2
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance finnhub-python pandas ta numpy pytz requests alpaca-py
      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"
          git config --global pull.rebase true
      - name: Run cycles (~4h40m, every 30 min)
        run: |
          chmod +x run_cycle.sh
          BLOCK_SECONDS=16800
          END=$((SECONDS + BLOCK_SECONDS))
          while [ $SECONDS -lt $END ]; do
            bash run_cycle.sh
            if [ $((SECONDS + 1800)) -ge $END ]; then break; fi
            sleep 1800
          done

  block-4:
    needs: block-3
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
